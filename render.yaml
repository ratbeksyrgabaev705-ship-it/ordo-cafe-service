# Render Blueprint — PostgreSQL маалымат deploy'дан кийин сакталат
databases:
  - name: ordo-db
    plan: free
    databaseName: ordo_cafe
    user: ordo_cafe

services:
  - type: web
    name: bazar-korgon
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: ordo-db
          property: connectionString
      - key: COURIER_DEFAULT_PHONE
        value: "0990912913"
      - key: COURIER_DEFAULT_NAME
        value: "Сыргый"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_MANAGER_CHAT_ID
        sync: false
