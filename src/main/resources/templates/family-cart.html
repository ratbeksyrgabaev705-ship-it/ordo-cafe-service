<!DOCTYPE html>
<html lang="ky" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${'Себет — ' + restaurantName}">Себет — FAMILY_PARK</title>
    <link rel="stylesheet" th:href="${customerCss}" href="/family-customer.css">
    <script th:inline="javascript">
        window.RESTAURANT = {
            id: /*[[${restaurantId}]]*/ 2,
            slug: /*[[${restaurantSlug}]]*/ 'family',
            name: /*[[${restaurantName}]]*/ 'FAMILY_PARK',
            base: /*[[${restaurantBase}]]*/ '/r/family'
        };
    </script>
    <script src="/restaurant-context.js"></script>
</head>
<body class="fam-body fp-cart-page">

<header class="fp-subheader">
    <button type="button" class="fp-back" onclick="location.href=rUrl('/')">←</button>
    <h1>Себет</h1>
    <div style="width:40px"></div>
</header>

<div class="fp-progress">
    <div class="fp-step active">
        <div class="fp-step-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6l-1-3H2"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg>
        </div>
        <span class="fp-step-label">1. Себет</span>
    </div>
    <div class="fp-step-line"></div>
    <button type="button" id="stepInfoLink" class="fp-step fp-step-link hidden" onclick="goCheckout()">
        <div class="fp-step-circle">2</div>
        <span class="fp-step-label">2. Маалымат</span>
    </button>
    <div id="stepInfoPlaceholder" class="fp-step">
        <div class="fp-step-circle">2</div>
        <span class="fp-step-label">2. Маалымат</span>
    </div>
    <div class="fp-step-line"></div>
    <div class="fp-step">
        <div class="fp-step-circle">3</div>
        <span class="fp-step-label">3. Төлөм</span>
    </div>
</div>

<main id="cartMain">
    <div id="emptyState" class="fp-empty hidden">
        <div style="font-size:48px">🛒</div>
        <p style="margin-top:12px;font-weight:800">Себет бош</p>
        <button type="button" class="fp-checkout-btn" style="margin-top:16px;width:auto;padding:12px 24px" onclick="location.href=rUrl('/')">Менюга кайтуу</button>
    </div>
    <div id="cartList"></div>
    <section id="summaryBox" class="fp-form-card hidden">
        <div class="fp-totals">
            <div class="fp-total-row"><span id="itemsLabel">Товарлар (0)</span><span id="foodTotal">0 сом</span></div>
            <div class="fp-total-row"><span>Жеткируу</span><span id="deliveryFee">0 сом</span></div>
            <div class="fp-total-row grand"><span>Жалпы сумма</span><span id="grandTotal">0 сом</span></div>
        </div>
    </section>
</main>

<div id="checkoutFixed" class="fp-submit-fixed hidden">
    <button type="button" class="fp-submit-btn" onclick="goCheckout()">
        <span>Маалыматка өтүү</span>
        <span class="fp-submit-arrow">›</span>
    </button>
</div>

<nav class="fp-bottom-nav">
    <a class="fp-nav-item" th:href="${restaurantBase}" href="/r/family">
        <span class="fp-nav-icon">🏠</span> Башкы
    </a>
    <a class="fp-nav-item active" href="#">
        <span class="fp-nav-icon">🛒<span id="navBadge" class="fp-nav-badge show">0</span></span> Себет
    </a>
</nav>

<script>
    const DELIVERY = 0;
    let cart = getStoredCart();

    function formatMoney(v) { return Number(v || 0).toLocaleString('ru-RU', { maximumFractionDigits: 0 }); }
    function escapeHtml(v) { return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function render() {
        cart = getStoredCart();
        const empty = document.getElementById('emptyState');
        const list = document.getElementById('cartList');
        const summary = document.getElementById('summaryBox');
        const fixed = document.getElementById('checkoutFixed');

        if (!cart.length) {
            empty.classList.remove('hidden');
            list.innerHTML = '';
            summary.classList.add('hidden');
            fixed.classList.add('hidden');
            document.getElementById('navBadge').classList.remove('show');
            document.body.classList.remove('fp-cart-checkout');
            document.getElementById('stepInfoLink').classList.add('hidden');
            document.getElementById('stepInfoPlaceholder').classList.remove('hidden');
            return;
        }

        empty.classList.add('hidden');
        summary.classList.remove('hidden');
        fixed.classList.remove('hidden');
        document.body.classList.add('fp-cart-checkout');
        document.getElementById('stepInfoLink').classList.remove('hidden');
        document.getElementById('stepInfoPlaceholder').classList.add('hidden');

        let html = '', foodTotal = 0, qty = 0;
        cart.forEach((item, i) => {
            const q = Math.max(0, Math.round(Number(item.quantity || 0)));
            const price = Number(item.price || 0);
            const sum = price * q;
            foodTotal += sum;
            qty += q;
            const img = item.image ? `<img src="${escapeHtml(item.image)}" alt="">` : `<div class="img-ph">🍽</div>`;
            html += `<article class="fp-cart-item">${img}<div><div style="font-weight:800;font-size:15px">${escapeHtml(item.nameKg || item.name || '')}</div><div style="font-size:12px;color:var(--fp-muted);margin-top:4px">${q} x ${formatMoney(price)} сом</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px"><strong style="color:var(--fp-burgundy)">${formatMoney(sum)} сом</strong><div class="fp-mini-counter"><button type="button" onclick="changeQty(${i},-1)">−</button><span>${q}</span><button type="button" onclick="changeQty(${i},1)">+</button></div></div></div></article>`;
        });

        list.innerHTML = html;
        document.getElementById('itemsLabel').textContent = 'Товарлар (' + qty + ')';
        document.getElementById('foodTotal').textContent = formatMoney(foodTotal) + ' сом';
        document.getElementById('deliveryFee').textContent = formatMoney(DELIVERY) + ' сом';
        document.getElementById('grandTotal').textContent = formatMoney(foodTotal + DELIVERY) + ' сом';
        const nb = document.getElementById('navBadge');
        nb.textContent = qty;
        nb.classList.add('show');
    }

    function changeQty(i, d) {
        cart[i].quantity = Math.max(0, cart[i].quantity + d);
        if (cart[i].quantity <= 0) cart.splice(i, 1);
        saveStoredCart(cart);
        render();
    }

    function goCheckout() {
        if (!cart.length) return;
        window.location.href = rUrl('/receipt');
    }

    render();
</script>
</body>
</html>
